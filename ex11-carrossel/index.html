<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrossel de Imagens</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="carousel-container">  <!-- Container do carrossel -->
    <div class="carousel-slides">   <!-- Slides do carrossel -->
      <div class="carousel-slide active">  <!-- Slide 1 (ativo por padrão) -->
        <img src="assets/slide1.jpg" alt="Imagem 1">
      </div>
      <div class="carousel-slide">       <!-- Slide 2 -->
        <img src="assets/slide2.jpg" alt="Imagem 2">
      </div>
      <div class="carousel-slide">     <!-- Slide 3 -->
        <img src="assets/slide3.jpg" alt="Imagem 3">
      </div>
    </div>
    <!-- Botões de navegação -->
    <button class="carousel-button prev">&#10094;</button> <!-- Botão "Anterior" -->
    <button class="carousel-button next">&#10095;</button> <!-- Botão "Próximo" -->
  </div>
  <!-- Inclui o arquivo JavaScript Lindo Cheiroso -->
  <script src="script.js"></script>
</body>
</html>
