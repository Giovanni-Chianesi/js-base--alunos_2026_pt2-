<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validação de Formulário</title>
  <style>
    /* Estilo para mensagens de erro */
    .error {
      color: red;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- Formulário de cadastro -->
  <form id="signupForm">
    <div>
      <label for="name">Nome:</label>
      <input type="text" id="name" name="name">
      <!-- Spam para exibir mensagem de erro do nome -->
      <span class="error" id="nameError"></span>
    </div>
    <div>
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email">
      <!-- Spam para exibir mensagem de erro do e-mail -->
      <span class="error" id="emailError"></span>
    </div>
    <div>
      <label for="password">Senha:</label>
      <input type="password" id="password" name="password">
      <!-- Spam para exibir mensagem de erro da senha -->
      <span class="error" id="passwordError"></span>
    </div>
    <button type="submit">Cadastrar</button>
  </form>

  <!-- JS Embutido -->

  <script>

    const form = document.querySelector('#signupForm');

    const nameInput = document.querySelector('#name');
    const emailInput = document.querySelector('#email');
    const passwordInput = document.querySelector('#password');

    const nameError = document.querySelector('#nameError');
    const emailError = document.querySelector('#emailError');
    const passwordError = document.querySelector('#passwordError');

    form.addEventListener('submit', function(event) {

      event.preventDefault();

      nameError.textContent = "";
      emailError.textContent = "";
      passwordError.textContent = "";

    let valido = true;

    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    // Validação do nome
    if (name === '') {
      nameError.textContent = 'Nome é obrigatório.';
      valido = false;
    }

    // Validação do e-mail
    if (email === '' || !email.includes('@')) {
      emailError.textContent = 'E-mail inválido.';
      valido = false;
    }

    // Validação da senha
    if (password.length < 6) {
      passwordError.textContent = 'Senha deve ter pelo menos 6 caracteres.';
      valido = false;
    }

    if (valido) {
      alert("Cadastro realizado com sucesso!");
      form.reset();
    }

  });

</script>
</body>
</html>
